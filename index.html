<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Panel Tilt — Robot Telemetry</title>

  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="Panel Tilt – Robot Telemetry Visualizer" />
  <meta property="og:description" content="Browser-based tool for loading, analyzing, and visualizing solar-panel inspection robot telemetry — pitch, roll, odometry, and panel stats." />
  <meta property="og:image" content="https://raw.githubusercontent.com/amihayb/panel-tilt-visualizer/main/images/nextpower-icon-1200x630.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://amihayb.github.io/panel-tilt-visualizer/" />

  <!-- Apply theme before first paint to avoid flash -->
  <script>
    (function () {
      var t = localStorage.getItem('pt-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="vendor/font-awesome.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="vendor/plotly.min.js"></script>
</head>
<body>

  <!-- ─── Top navigation ─────────────────────────────────────────────────── -->
  <div class="topnav" id="topnav">
    <img src="images/nextpower-logo-white.svg" alt="NextPower logo" class="topnav-brand-logo logo-dark-theme">
    <img src="images/nextpower-logo-black.svg" alt="NextPower logo" class="topnav-brand-logo logo-light-theme">

    <span class="topnav-fileopen" title="Load telemetry CSV">
      <i class="fa fa-folder-open"></i>
      <input id="file-input" type="file" accept=".csv,.txt">
    </span>

    <a id="export-btn" class="topnav-action disabled" title="Export full telemetry CSV with X and panel columns">
      <i class="fa fa-save"></i>
    </a>

    <a id="export-panel-btn" class="topnav-action disabled" title="Export panel stats CSV (mean pitch per panel)">
      <i class="fa fa-table"></i>
    </a>

    <div class="axis-toggle" id="axis-toggle" title="Switch between pitch and roll plots">
      <button class="axis-btn active" data-axis="pitch">Pitch</button>
      <button class="axis-btn" data-axis="roll">Roll</button>
    </div>

    <div class="axis-toggle" id="edge-filter-toggle" title="Choose which edge traces to show">
      <button class="axis-btn active" data-edge-filter="both">Both</button>
      <button class="axis-btn" data-edge-filter="east">East</button>
      <button class="axis-btn" data-edge-filter="west">West</button>
    </div>

    <span class="topnav-apptitle">Panels Tilt Visualizer</span>
    <span class="topnav-spacer"></span>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light / dark theme">
      <i class="fa fa-moon-o" id="theme-icon"></i>
    </button>

  </div>

  <!-- ─── Stats bar ──────────────────────────────────────────────────────── -->
  <div class="stats-bar hidden" id="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="stat-rows">—</div>
      <div class="stat-label">Rows</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-distance">—</div>
      <div class="stat-label">Total Distance (m)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-timespan">—</div>
      <div class="stat-label">Time Span (s)</div>
    </div>
    <div class="stat-card stat-card--bias">
      <div class="stat-value stat-value--bias">
        <input type="number" id="start-panel-input" step="1"
          title="Signed integer panel number assigned to the first detected panel">
      </div>
      <label class="stat-label" for="start-panel-input">Start panel</label>
    </div>
    <div class="stat-card stat-card--bias">
      <div class="stat-value stat-value--bias">
        <input type="number" id="bias-pitch-input" step="0.1" min="-90" max="90"
          title="Subtract from raw pitch before gaps &amp; plots">
      </div>
      <label class="stat-label" for="bias-pitch-input">Bias pitch (deg)</label>
    </div>
    <div class="stat-card stat-card--bias">
      <div class="stat-value stat-value--bias">
        <input type="number" id="bias-roll-input" step="0.1" min="-90" max="90"
          title="Subtract from raw roll before plots">
      </div>
      <label class="stat-label" for="bias-roll-input">Bias roll (deg)</label>
    </div>
  </div>

  <!-- ─── Drop zone (shown before file loaded) ───────────────────────────── -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-indicator">
      <div class="drop-icon"><i class="fa fa-arrow-down"></i></div>
      <div class="drop-text">Drop a telemetry CSV here<br>or click <strong><i class="fa fa-folder-open"></i> Load</strong> in the toolbar</div>
    </div>
  </div>

  <!-- ─── Plot area ─────────────────────────────────────────────────────── -->
  <div class="plot-area hidden" id="plot-area" data-axis="pitch">
    <div class="plot-column">
      <div id="plot-panel-tilt-lines"></div>
      <div id="plot-panel-roll-lines"></div>
      <div id="plot-panel-pitch"></div>
      <div id="plot-panel-roll"></div>
      <div id="plot-pitch"></div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="side-view-wrapper" id="side-view-wrapper">
      <div class="side-view-toggle axis-toggle" id="side-view-edge-toggle">
        <button class="axis-btn active" data-edge="east">East</button>
        <button class="axis-btn" data-edge="west">West</button>
      </div>
      <div id="plot-side-view"></div>
    </div>
  </div>

  <!-- ─── Scripts ────────────────────────────────────────────────────────── -->
  <script src="js/config.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/plots.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
